# Spot Render IA Auto Agents - Kubernetes Manifests (with Health Checks & HPA)
# =============================================================================
# PT-BR: Manifests com liveness probe, readiness probe e HPA para todos os agentes
# EN-US: Manifests with liveness probe, readiness probe and HPA for all agents
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: spot-render-ai-agents
  labels:
    app.kubernetes.io/name: spot-render-ia-agents
    app.kubernetes.io/component: agents
    app.kubernetes.io/part-of: spot-render

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agents
  namespace: spot-render-ai-agents

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-agents
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events", "namespaces", "endpoints", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-agents
subjects:
  - kind: ServiceAccount
    name: ai-agents
    namespace: spot-render-ai-agents
roleRef:
  kind: ClusterRole
  name: ai-agents
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: spot-render-ai-agents
data:
  AGENT_NAMESPACE: "spot-render"
  AGENT_LOG_LEVEL: "INFO"
  OLLAMA_URL: "http://ollama.spot-ai.svc.cluster.local:11434"
  OLLAMA_MODEL: "llama3.2:latest"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-messages
  namespace: spot-render-ai-agents
data:
  messages: "[]"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-shared-state
  namespace: spot-render-ai-agents
data:
  state: "{}"

---
# SRE Agent - DaemonSet (runs on every node, no HPA needed)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sre-agent
  namespace: spot-render-ai-agents
spec:
  selector:
    matchLabels:
      app: sre-agent
  template:
    metadata:
      labels:
        app: sre-agent
    spec:
      serviceAccountName: ai-agents
      containers:
        - name: sre-agent
          image: python:3.11-slim
          command: ["python3", "-c"]
          args:
            - |
              import subprocess, sys, json, time, logging, http.server, socketserver, threading
              from datetime import datetime
              subprocess.check_call([sys.executable, "-m", "pip", "install", "kubernetes>=29.0.0"])
              from kubernetes import client, config
              logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(name)s - %(levelname)s - %(message)s')
              logger = logging.getLogger("sre-agent")
              HEALTH_OK = True

              class HealthHandler(http.server.SimpleHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == '/healthz':
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b'OK')
                      else:
                          self.send_response(404)
                          self.end_headers()
                  def log_message(self, format, *args): pass

              def start_health_server():
                  with socketserver.TCPServer(('', 8080), HealthHandler) as httpd:
                      httpd.serve_forever()

              threading.Thread(target=start_health_server, daemon=True).start()
              try:
                  config.load_incluster_config()
              except:
                  config.load_kube_config()
              v1 = client.CoreV1Api()
              logger.info("SRE Agent started")

              def get_unhealthy_pods():
                  try:
                      pods = v1.list_pod_for_all_namespaces(watch=False).items
                      return [{'name': p.metadata.name, 'namespace': p.metadata.namespace, 'phase': p.status.phase}
                              for p in pods if p.status.phase not in ['Running', 'Succeeded']]
                  except Exception as e:
                      logger.error(f"Error: {e}")
                      return []

              while True:
                  unhealthy = get_unhealthy_pods()
                  logger.info(f"SRE cycle: {len(unhealthy)} unhealthy pods")
                  if unhealthy:
                      logger.warning(f"Unhealthy pods: {json.dumps(unhealthy)}")
                  time.sleep(30)
          envFrom:
            - configMapRef:
                name: agent-config
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

---
# DevOps Agent - Deployment with HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-agent
  namespace: spot-render-ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-agent
  template:
    metadata:
      labels:
        app: devops-agent
    spec:
      serviceAccountName: ai-agents
      containers:
        - name: devops-agent
          image: python:3.11-slim
          command: ["python3", "-c"]
          args:
            - |
              import subprocess, sys, json, time, logging, http.server, socketserver, threading
              from datetime import datetime
              subprocess.check_call([sys.executable, "-m", "pip", "install", "kubernetes>=29.0.0"])
              from kubernetes import client, config
              logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(name)s - %(levelname)s - %(message)s')
              logger = logging.getLogger("devops-agent")

              class HealthHandler(http.server.SimpleHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == '/healthz':
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b'OK')
                      else:
                          self.send_response(404)
                          self.end_headers()
                  def log_message(self, format, *args): pass

              def start_health_server():
                  with socketserver.TCPServer(('', 8080), HealthHandler) as httpd:
                      httpd.serve_forever()

              threading.Thread(target=start_health_server, daemon=True).start()
              try:
                  config.load_incluster_config()
              except:
                  config.load_kube_config()
              apps_v1 = client.AppsV1Api()
              logger.info("DevOps Agent started")

              def get_deployments(ns):
                  try:
                      return [{'name': d.metadata.name, 'replicas': d.spec.replicas, 'ready': d.status.ready_replicas or 0}
                              for d in apps_v1.list_namespaced_deployment(ns).items]
                  except Exception as e:
                      logger.error(f"Error: {e}")
                      return []

              while True:
                  deploys = get_deployments('spot-render')
                  logger.info(f"DevOps cycle: {len(deploys)} deployments")
                  for d in deploys:
                      if d['replicas'] != d['ready']:
                          logger.warning(f"Deployment {d['name']}: {d['ready']}/{d['replicas']} ready")
                  time.sleep(45)
          envFrom:
            - configMapRef:
                name: agent-config
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

---
# Self-Healing Agent - Deployment with HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-agent
  namespace: spot-render-ai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: self-healing-agent
  template:
    metadata:
      labels:
        app: self-healing-agent
    spec:
      serviceAccountName: ai-agents
      containers:
        - name: self-healing-agent
          image: python:3.11-slim
          command: ["python3", "-c"]
          args:
            - |
              import subprocess, sys, json, time, logging, http.server, socketserver, threading
              subprocess.check_call([sys.executable, "-m", "pip", "install", "kubernetes>=29.0.0", "httpx>=0.26.0"])
              import httpx
              from kubernetes import client, config
              logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(name)s - %(levelname)s - %(message)s')
              logger = logging.getLogger("self-healing-agent")

              class HealthHandler(http.server.SimpleHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == '/healthz':
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b'OK')
                      else:
                          self.send_response(404)
                          self.end_headers()
                  def log_message(self, format, *args): pass

              def start_health_server():
                  with socketserver.TCPServer(('', 8080), HealthHandler) as httpd:
                      httpd.serve_forever()

              threading.Thread(target=start_health_server, daemon=True).start()
              try:
                  config.load_incluster_config()
              except:
                  config.load_kube_config()
              v1 = client.CoreV1Api()
              OLLAMA_URL = "http://ollama.spot-ai.svc.cluster.local:11434"
              OLLAMA_MODEL = "llama3.2:latest"
              logger.info("SelfHealing Agent started")

              def check_ollama():
                  try:
                      r = httpx.get(f"{OLLAMA_URL}/api/tags", timeout=10)
                      return r.status_code == 200
                  except:
                      return False

              def get_unhealthy_pods():
                  try:
                      pods = v1.list_pod_for_all_namespaces(watch=False).items
                      return [{'name': p.metadata.name, 'namespace': p.metadata.namespace, 'phase': p.status.phase}
                              for p in pods if p.status.phase not in ['Running', 'Succeeded']]
                  except Exception as e:
                      logger.error(f"Error: {e}")
                      return []

              def diagnose_with_llm(issues):
                  if not issues:
                      return None
                  prompt = "Analyze and respond with JSON with diagnosis and actions for: " + json.dumps(issues)
                  try:
                      r = httpx.post(f"{OLLAMA_URL}/api/chat", json={
                          "model": OLLAMA_MODEL,
                          "messages": [{"role": "user", "content": prompt}],
                          "stream": False
                      }, timeout=60)
                      if r.status_code == 200:
                          return r.json().get("message", {}).get("content", "")
                      return None
                  except Exception as e:
                      logger.error(f"LLM error: {e}")
                      return None

              def restart_pod(ns, name):
                  try:
                      v1.delete_namespaced_pod(name, ns)
                      logger.info(f"Restarted pod {ns}/{name}")
                      return True
                  except Exception as e:
                      logger.error(f"Error: {e}")
                      return False

              while True:
                  unhealthy = get_unhealthy_pods()
                  ollama_ok = check_ollama()
                  logger.info(f"SelfHealing cycle: {len(unhealthy)} unhealthy, Ollama: {ollama_ok}")

                  if unhealthy:
                      if ollama_ok:
                          diagnosis = diagnose_with_llm(unhealthy)
                          if diagnosis:
                              logger.info(f"LLM diagnosis: {diagnosis[:200]}")
                      for pod in unhealthy[:2]:
                          restart_pod(pod['namespace'], pod['name'])
                          time.sleep(2)

                  time.sleep(60)
          envFrom:
            - configMapRef:
                name: agent-config
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

---
# HPA for DevOps Agent
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-agent
  namespace: spot-render-ai-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-agent
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# HPA for Self-Healing Agent
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: self-healing-agent
  namespace: spot-render-ai-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: self-healing-agent
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
